name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: android-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: ./gradlew :sdk:assembleRelease --no-daemon
      - name: Unit tests
        run: ./gradlew :sdk:testReleaseUnitTest --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-test-report
          path: sdk/build/reports/tests/
          retention-days: 7

  lint:
    name: Android lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :sdk:lint --no-daemon
      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-lint-report
          path: sdk/build/reports/lint-results-*.html
          retention-days: 7
