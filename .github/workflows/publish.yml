# Publish com.adfinia:sdk-android to Maven Central on tag push.
#
# Trigger: pushing a tag matching `sdk-android-v*` (e.g.
# `sdk-android-v1.0.0`). Uses the `com.vanniktech.maven.publish` plugin
# configured in sdk/build.gradle.kts to handle the Sonatype staging-repo
# dance + auto-release.
#
# Founder owns the tag-push step + GPG / Sonatype credentials.
#
# Safety:
#   - Tag version (sdk-android-vX.Y.Z) must match the version inside
#     `mavenPublishing.coordinates(...)`. A mismatch fails the workflow
#     before any upload.
#   - Missing SIGNING_KEY / OSSRH_USERNAME is logged + exit 0.

name: Publish Android SDK

on:
  push:
    tags:
      - 'sdk-android-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Verify tag matches gradle coordinates version
        run: |
          TAG_REF="${GITHUB_REF#refs/tags/sdk-android-v}"
          GRADLE_VERSION=$(grep -E 'coordinates\("com\.adfinia",' sdk/build.gradle.kts | sed -E 's/.*"([^"]+)"\)$/\1/')
          if [ "$TAG_REF" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag sdk-android-v${TAG_REF} does not match build.gradle.kts coordinates version ${GRADLE_VERSION}"
            exit 1
          fi
          echo "Tag and gradle coordinates agree on v${GRADLE_VERSION}"

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if [ -z "${ORG_GRADLE_PROJECT_signingInMemoryKey}" ] || [ -z "${ORG_GRADLE_PROJECT_mavenCentralUsername}" ]; then
            echo "::warning::SIGNING_KEY or OSSRH_USERNAME secret is not set — skipping publish (re-tag after adding all four secrets)."
            exit 0
          fi
          ./gradlew :sdk:publishAndReleaseToMavenCentral --no-configuration-cache
